name: Update News Index

on:
  push:
    paths:
      - 'news/**.json'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate news/index.json
        run: |
          files=$(ls news/*.json | grep -v 'news/index.json' | xargs -I{} basename {} .json)
          json=$(echo "$files" | jq -R . | jq -s .)
          echo "$json" > news/index.json

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/index.json
          git diff --cached --quiet || git commit -m "chore: auto-update news/index.json"
          git push